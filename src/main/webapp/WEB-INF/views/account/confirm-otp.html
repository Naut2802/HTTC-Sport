<html xmlns:th="http://www.thymeleaf.org">
<div id="layoutAuthentication">
	<div id="layoutAuthentication_content">
		<main>
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-lg-5 bg-success-subtle border rounded border-3"
						style="height: 450px; margin-top: 50px">
						<div class="card shadow-lg border-0 rounded-lg mt-5">
							<form th:action="@{/account/confirm-otp}" method="post">
								<div class="card-header">
									<h3 class="text-center font-weight-light my-4">Lấy Lại Mật
										Khẩu</h3>
								</div>
								<div class="card-body">
									<div class="small mb-3 text-muted">Hệ thống đang gửi mã OTP về tài khoản email của bạn.
									Vui lòng kiểm tra email để lấy mã OTP và nhập mã xác nhận.</div>
									<div class="form-floating mb-3">
										<input class="form-control" id="inputOtp" 
											type="text" required name="confirmOtp"
											requiredmsg="Vui lòng nhập vào mã OTP đã gửi qua email của bạn" /> <label
											for="inputOtp">Nhập Mã OTP</label>
									</div>

								</div>
								<div class="card-footer text-center py-3">
									<div class="d-flex align-items-center justify-content-between">
										<a class="btn btn-outline-danger" th:href="@{/account/forgotPassword-2}">Quay trở lại</a> 
										<button class="btn btn-outline-success">Xác Nhận</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
<script type="text/javascript"
	src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script type="text/javascript">
	$(document).ready(
			function() {
				var elements = $("input");
				for (var i = 0; i < elements.length; i++) {
					elements[i].oninvalid = function(e) {
						e.target.setCustomValidity("");
						if (!e.target.validity.valid) {
							e.target.setCustomValidity(e.target
									.getAttribute("requiredmsg"));
						}
					};
					elements[i].oninput = function(e) {
						e.target.setCustomValidity("");
					};
				}
			})
</script>
</html>
