<html xmlns:th="http://www.thymeleaf.org">
<div id="layoutAuthentication">
	<div id="layoutAuthentication_content">
		<main>
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-lg-5 bg-success-subtle border rounded border-3"
						style="height: 450px; margin-top: 50px">
						<div class="card shadow-lg border-0 rounded-lg mt-5">
							<form th:action="@{/account/forgotPassword-2}" method="post">
								<div class="card-header">
									<h3 class="text-center font-weight-light my-4">Lấy Lại Mật
										Khẩu</h3>
								</div>
								<div class="card-body">
									<div class="small mb-3 text-muted">Nhập chính xác
										username đã đăng ký trên hệ thống và hệ thống sẽ kiểm tra
										thông tin, nếu thông tin đúng sẽ đến bước tiếp theo.</div>
									<div class="form-floating mb-3">
										<input class="form-control" id="Username" type="text" required
											name="username" requiredmsg="Không được Để Trống" /> <label
											for="Username">Nhập Username</label>
									</div>

								</div>
								<div class="card-footer text-center py-3">
									<div class="d-flex align-items-center justify-content-between">
										<a class="btn btn-outline-danger"
											href="${ contextPath }/account/login">Về Đăng Nhập</a>
										<button class="btn btn-outline-success">Bước Kế Tiếp</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
<script type="text/javascript"
	src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script type="text/javascript">
	$(document).ready(
			function() {
				var elements = $("input");
				for (var i = 0; i < elements.length; i++) {
					elements[i].oninvalid = function(e) {
						e.target.setCustomValidity("");
						if (!e.target.validity.valid) {
							e.target.setCustomValidity(e.target
									.getAttribute("requiredmsg"));
						}
					};
					elements[i].oninput = function(e) {
						e.target.setCustomValidity("");
					};
				}
			})
</script>
</html>
