<html xmlns:th="http://www.thymeleaf.org">
  <div class="container">
    <main>
      <div class="container-fluid px-4">
        <div id="carouselExampleAutoplaying" class="carousel slide mt-5" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="/imgs/carosel-2.jpg" class="d-block w-100" />
            </div>
            <div class="carousel-item">
              <img src="/imgs/carosel-3.jpg" class="d-block w-100" />
            </div>
            <div class="carousel-item">
              <img src="/imgs/carosel-1.jpg" class="d-block w-100" />
            </div>
            <div class="carousel-item">
              <img src="/imgs/carosel-4.jpg" class="d-block w-100" />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
      <hr />
      <h1 class="text-center">Lựa Chọn Nổi Bật</h1>
      <div class="row my-4 d-flex flex-wrap">
        <div th:each="san, status : ${session.listSanActive}" class="m-2" style="width: 48%">
          <div class="card mb-3">
            <div
              class="row g-0"
              th:with="maSan=${ san.maSan }, img=${ san.listHinhAnh.size() == 0 ? '' : san.listHinhAnh.get(0).tenAnh }">
              <div class="col-xl-6 p-3">
                <a th:href="@{'/san-bong-da/' + ${maSan}}">
                  <img th:src="@{'/imgs/' + ${img}}" class="card img-fluid rounded" />
                </a>
              </div>
              <div class="col-xl-6">
                <div class="card-body">
                  <h5 class="card-title">
                    <a
                      class="text-decoration-none text-black fw-bolder"
                      th:href="@{'/san-bong-da/' + ${maSan}}"
                      th:text="*{ san.tenSan }"></a>
                  </h5>
                  <div class="my-4">
                    <p class="card-text fw-bolder my-2">
                      Loại Sân: <span class="fw-normal" th:text="*{ san.loaiSan.tenLoai }"></span>
                    </p>
                    <p class="card-text fw-bolder my-2">
                      Đánh Giá:
                      <span
                        class="fw-normal"
                        th:text="${ session.listSao[__${ status.index }__] }"></span>
                      <i class="text-warning fs-5 bi bi-star-fill"></i>
                    </p>
                    <p class="card-text fw-bolder my-2">
                      Giá:
                      <span class="fs-5 text-danger" th:text="*{ san.giaSan }"> / Giờ </span>
                    </p>
                    <p class="card-text fw-bolder my-2">
                      Địa Chỉ: <span class="fw-normal" th:text="*{ san.diaChi }"></span>
                    </p>
                  </div>
                  <div class="row">
                    <div class="col-4">
                      <p class="card-text"><i class="bi bi-wifi"></i> Wifi</p>
                    </div>
                    <div class="col-8">
                      <p class="card-text"><i class="bi bi-shop-window"></i> Căn Tin</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <hr />
      <div class="row my-4">
        <div class="col-1"></div>
        <div class="col-10">
          <div class="card text-bg-success">
            <img src="/imgs/home-1.jpg" class="card-img" />
            <div class="card-img-overlay">
              <h1 class="card-title fw-bolder">
                <a class="text-decoration-none text-dark" th:href="@{/san-bong-da/danh-sach-san}"
                  >SÂN BÓNG</a
                >
              </h1>
              <a class="btn btn-light" th:href="@{/san-bong-da/danh-sach-san}"> Chi Tiết</a>
            </div>
          </div>
        </div>
        <div class="col-1"></div>
      </div>
      <div class="row my-4">
        <div class="col-lg-6">
          <div class="card text-bg-primary">
            <img src="/imgs/Liverpool.jpg" class="card-img" />
            <div class="card-img-overlay">
              <h1 class="card-title fw-bolder">
                <a class="text-decoration-none text-white" th:href="@{/news}">TIN TỨC</a>
              </h1>
              <a class="btn btn-light" th:href="@{/news}"> Chi Tiết</a>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card text-bg-danger">
            <img src="/imgs/home-3.jpg" class="card-img" />
            <div class="card-img-overlay">
              <h1 class="card-title fw-bolder">
                <a class="text-decoration-none text-white" th:href="@{/contact}">LIÊN HỆ</a>
              </h1>
              <a class="btn btn-light" th:href="@{/contact}"> Chi Tiết</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</html>
